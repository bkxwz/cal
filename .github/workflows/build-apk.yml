name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'

    - name: Install dependencies
      run: npm install -g cordova

    - name: Build APK
      run: |
        cordova create android_calculator
        cd android_calculator
        cordova platform add android
        cordova build android

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-calculator-apk
        path: android_calculator/platforms/android/app/build/outputs/apk/debug/app-debug.apk